<!DOCTYPE html>
<html lang="kk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Еңлікке surprise</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #0f172a, #1e293b, #334155);
      font-family: Arial, sans-serif;
      color: white;
      padding: 20px;
    }

    .box {
      width: 100%;
      max-width: 900px;
      text-align: center;
    }

    #screen {
      font-size: 52px;
      font-weight: bold;
      line-height: 1.5;
      opacity: 1;
      transition: opacity 0.5s ease;
      word-wrap: break-word;
    }

    .yellow {
      color: #facc15;
    }

    .pink {
      color: #f472b6;
    }

    .count {
      font-size: 88px;
    }

    .final {
      font-size: 34px;
      line-height: 1.7;
    }

    @media (max-width: 768px) {
      #screen {
        font-size: 34px;
      }

      .count {
        font-size: 58px;
      }

      .final {
        font-size: 24px;
      }
    }
  </style>
</head>
<body>
  <div class="box">
    <div id="screen">Бастаймын</div>
  </div>

  <script>
    const screen = document.getElementById("screen");

    const introTexts = [
      "Еңлік, сәлем 🌷",
      "Қалайсың?",
      "<span class='yellow'>Наурыз мейрамы құтты болсын! ✨</span>",
      "Сен жауап жазу үшін,<br>мен <span class='pink'>1000 рет санасам</span>,<br>жауап жазасың ба? 😄",
      "Жақсы онда... 😏",
      "Санауды бастаймын... 🚀"
    ];

    let introIndex = 0;
    let count = 1;
    const maxCount = 30;

    function fadeOut(callback) {
      screen.style.opacity = "0";
      setTimeout(callback, 500);
    }

    function fadeIn() {
      screen.style.opacity = "1";
    }

    function showIntro() {
      if (introIndex < introTexts.length) {
        fadeOut(() => {
          screen.className = "";
          screen.innerHTML = introTexts[introIndex];
          fadeIn();

          introIndex++;

          setTimeout(showIntro, 1800);
        });
      } else {
        setTimeout(showCount, 700);
      }
    }

    function showCount() {
      if (count <= maxCount) {
        fadeOut(() => {
          screen.className = "count";
          screen.innerHTML = count + ") Еңлік";
          fadeIn();

          count++;
          setTimeout(showCount, 650);
        });
      } else {
        showFinal();
      }
    }

    function showFinal() {
      fadeOut(() => {
        screen.className = "final";
        screen.innerHTML =
          "30-ға дейін жеттік 😄<br><br>" +
          "1000-ға дейін санап шыққанша біраз уақыт кететін сияқты.<br>" +
          "Сен жауап жаза салшы,<br>" +
          "қалғанын кейін жалғастырып жіберемін 😉";
        fadeIn();
      });
    }

    setTimeout(showIntro, 500);
  </script>
</body>
</html>

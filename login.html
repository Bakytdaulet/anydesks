<!DOCTYPE html>
<html lang="kk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Qulpynai Wi-Fi</title>

<!-- FontAwesome для иконок -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">

<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #f0f4f8, #e6f2ef);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    text-align: center;
}

.login-container {
    background: #ffffff;
    padding: 30px;
    border-radius: 15px;
    width: 90%;
    max-width: 380px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    animation: fadeIn 1s ease-out forwards;
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(15px); }
    to { opacity: 1; transform: translateY(0); }
}

.logo {
    width: 120px;
    margin-bottom: 20px;
}

#animated-heading {
    font-size: 18px;
    font-weight: bold;
    margin-bottom: 20px;
}

@keyframes fadeInLetter {
    from { opacity: 0; transform: translateY(-8px); }
    to { opacity: 1; transform: translateY(0); }
}

@keyframes colorChange {
    0% { color: #ff5733; }
    50% { color: #1db3a6; }
    100% { color: #ff5733; }
}

.login-btn {
    background: linear-gradient(135deg,#1db3a6,#17978d);
    color: white;
    border: none;
    padding: 15px;
    width: 100%;
    border-radius: 30px;
    font-size: 18px;
    cursor: pointer;
    margin-top: 15px;
}

.login-btn:hover {
    transform: scale(1.05);
}

.tagline {
    margin-top: 20px;
    font-size: 14px;
    font-weight: bold;
    color: #555;
}

.social-icons {
    margin-top: 15px;
    display: flex;
    justify-content: center;
    gap: 20px;
}

.social-icons a {
    width: 40px;
    height: 40px;
    line-height: 40px;
    font-size: 20px;
    border-radius: 50%;
    background: #f0f4f8;
    color: #1db3a6;
    text-decoration: none;
    display: inline-block;
    transition: transform 0.3s, color 0.3s;
}

.social-icons a:hover {
    transform: scale(1.2);
}
</style>
</head>

<body>

<div class="login-container">

    <img src="https://yt3.googleusercontent.com/trL08V_BGd6DAIyRqH8B8P57-bQn26qD4DS8YNpFsZLsMQd5lU4so6HpsKxtKAU_XPTv8ro76A=s900-c-k-c0x00ffffff-no-rj" class="logo">

    <h2 id="animated-heading"></h2>

    <!-- 🔑 HOTSPOT LOGIN -->
    <form method="post" action="/login">
        <input type="hidden" name="username" value="guest">
        <input type="hidden" name="password" value="12345678">
        <button type="submit" class="login-btn">Кіру</button>
    </form>

    <p class="tagline">Qulpynai Free Wi-Fi</p>

    <div class="social-icons">
        <a href="https://www.instagram.com/qulpynai_bakery/" target="_blank">
            <i class="fab fa-instagram"></i>
        </a>
        <a href="https://qulpynai.kz/?section=all" target="_blank">
            <i class="fas fa-link"></i>
        </a>
    </div>

</div>

<script>
document.addEventListener("DOMContentLoaded", function () {
    const text = "ТӘТТІ ЕСТЕЛІКТЕР СЫЙЛАЙМЫЗ!";
    const heading = document.getElementById("animated-heading");

    text.split("").forEach((char, index) => {
        const span = document.createElement("span");
        span.textContent = char;
        span.style.opacity = "0";
        span.style.animation =
            `fadeInLetter 0.25s forwards ${index * 0.04}s, colorChange 3s infinite alternate`;
        heading.appendChild(span);
    });
});
</script>

</body>
</html>
